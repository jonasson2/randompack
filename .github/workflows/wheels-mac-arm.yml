name: macOS arm64 wheels

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-14

    env:
      FC: gfortran
      CIBW_ARCHS_MACOS: arm64
      CIBW_BUILD: "cp313-*"
      CIBW_CONFIG_SETTINGS: "setup-args=-Dblas=accelerate"

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: python -m pip install -U pip cibuildwheel

      - name: Install gfortran
        run: brew install gcc

        - name: Install gfortran
          run: brew install gcc

        - name: Locate gfortran and export FC
          run: |
            GFORTRAN=$(ls "$(brew --prefix)/bin"/gfortran-* | head -n1)
            echo "Found gfortran at $GFORTRAN"
            echo "FC=$GFORTRAN" >> $GITHUB_ENV
            echo "$(brew --prefix)/bin" >> $GITHUB_PATH
            $GFORTRAN --version
              
      - name: Verify architecture
        run: uname -m

      - name: Build wheels
        run: python -m cibuildwheel python/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl
