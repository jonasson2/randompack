name: MacOS-arm-docwheel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      CIBW_BUILD: "cp312-*"
      CIBW_ARCHS_MACOS: arm64
      CIBW_CONFIG_SETTINGS: "setup-args=-Dblas=accelerate"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          python -m pip install -U pip
          python -m pip install cibuildwheel
      - name: Install gfortran
        run: |
          brew install gcc
          FC=$(ls "$(brew --prefix)/bin"/gfortran-* | head -n1)
          echo "FC=$FC" >> "$GITHUB_ENV"
      - name: Build wheel
        run: python -m cibuildwheel python/
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: docwheel-macos-arm
          path: wheelhouse/*.whl
          retention-days: 7

  docs:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: docwheel-macos-arm
          path: wheelhouse
      - name: Install wheel + docs deps
        run: |
          python -m pip install -U pip
          python -m pip install wheelhouse/*.whl
          python -m pip install -r python/docs/requirements.txt
      - name: Build HTML
        working-directory: python/docs
        run: make html
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: python/docs/_build/html
          force_orphan: true
