name: Windows wheels

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    env:
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_BUILD: "cp313-*"
      CIBW_CONFIG_SETTINGS: "setup-args=-Dblas=builtin"

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: python -m pip install -U pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel python/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-amd64
          path: wheelhouse/*.whl
          retention-days: 7
