name: MacOS-arm-wheels

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-14

    env:
      CIBW_ARCHS_MACOS: arm_64
      CIBW_BUILD: "cp313-*"
      CIBW_CONFIG_SETTINGS: "setup-args=-Dblas=accelerate"
      
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: python -m pip install -U pip cibuildwheel

      - name: Locate gfortran and export FC
        run: |
          brew install gcc
          FC=$(ls "$(brew --prefix)/bin"/gfortran-* | head -n1)
          echo "FC=$FC" >> "$GITHUB_ENV"

      - name: Verify architecture
        run: uname -m

      - name: Build wheels
        run: python -m cibuildwheel python/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm
          path: wheelhouse/*.whl
          retention-days: 7
