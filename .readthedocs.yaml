version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - libopenblas-dev
  jobs:
    pre_install:
      - python -m pip install -r python/docs/requirements.txt
      - python -m pip install ./python -Csetup-args=-Dblas=openblas

sphinx:
  configuration: python/docs/conf.py
